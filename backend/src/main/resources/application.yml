spring:
  application:
    name: phishguard-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:phishguard}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true


  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: classpath:db/migration

  thymeleaf:
    cache: ${THYMELEAF_CACHE:false}

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

logging:
  level:
    org.springframework.security: INFO
    org.hibernate.SQL: ${SQL_LOG_LEVEL:WARN}

app:
  seed:
    admin:
      enabled: ${ADMIN_SEED_ENABLED:false}
      email: ${ADMIN_SEED_EMAIL:}
      password: ${ADMIN_SEED_PASSWORD:}
      display-name: ${ADMIN_SEED_DISPLAY_NAME:Admin}
      role: ${ADMIN_SEED_ROLE:ADMIN}
